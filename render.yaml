services:
  - type: web
    name: phishguard
    env: python
    pythonVersion: "3.11"
    buildCommand: pip install -r requirements.txt && python -c "import nltk; nltk.download('wordnet', download_dir='nltk_data', quiet=True); nltk.download('punkt_tab', download_dir='nltk_data', quiet=True); nltk.download('stopwords', download_dir='nltk_data', quiet=True)" && python data_loader.py && python -u train.py
    startCommand: gunicorn -w 2 -b 0.0.0.0:$PORT app:app
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: NLTK_DATA
        value: /opt/render/project/src/nltk_data
